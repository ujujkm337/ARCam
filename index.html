<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android AR Ruler (System Mode)</title>
    <style>
        body { 
            margin: 0; 
            background: #121212; 
            color: white; 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            text-align: center;
        }
        .card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 80%;
        }
        .btn-ar {
            display: inline-block;
            background: #4285f4;
            color: white;
            text-decoration: none;
            padding: 20px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.4);
        }
        .info {
            color: #888;
            font-size: 14px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>AR Линейка</h1>
        <p>Для Android (через системный Scene Viewer)</p>
        
        <a class="btn-ar" href="intent://arvr.google.com/scene-viewer/1.0?file=https://modelviewer.dev/shared-assets/models/Astronaut.glb&mode=ar_only&resizable=false#Intent;scheme=https;package=com.google.android.googlequicksearchbox;action=android.intent.action.VIEW;end;">
            ОТКРЫТЬ КАМЕРУ
        </a>

        <div class="info">
            После открытия поводи камерой, чтобы найти пол. <br>
            Линейка будет доступна в инструментах самого плеера.
        </div>
    </div>

</body>
</html>
