<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Debugger</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #111; color: #0f0; font-family: monospace; padding: 10px; }
        #log { font-size: 10px; border: 1px solid #333; height: 100px; overflow: scroll; margin-bottom: 10px; }
        model-viewer { width: 100%; height: 60vh; border: 1px solid #555; }
    </style>
</head>
<body>

    <div id="log">Лог инициализации...<br></div>
    
    <model-viewer id="ctrl"
        src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
        ar ar-modes="webxr scene-viewer"
        camera-controls
        alt="Тестовая модель">
        <button slot="ar-button" id="start-btn" style="width:100%; padding:20px; background:#007bff; color:white; border:none; font-weight:bold;">
            ЗАПУСТИТЬ AR СЕССИЮ
        </button>
    </model-viewer>

    <script>
        const log = document.getElementById('log');
        const btn = document.getElementById('start-btn');

        function print(msg) { log.innerHTML += "> " + msg + "<br>"; }

        // Проверка поддержки WebXR при загрузке
        window.addEventListener('load', () => {
            if (navigator.xr) {
                print("WebXR обнаружен в навигаторе.");
                navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
                    print(supported ? "AR поддерживается!" : "AR НЕ поддерживается устройством.");
                });
            } else {
                print("Ошибка: navigator.xr не найден (нужен HTTPS).");
            }
        });

        btn.addEventListener('click', () => {
            print("Нажата кнопка. Попытка входа в AR...");
        });

        // Отлавливаем ошибки самого компонента
        document.querySelector('#ctrl').addEventListener('error', (e) => {
            print("Ошибка модели: " + e.detail.type);
        });
    </script>
</body>
</html>
